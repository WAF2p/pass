name: Release

# Triggers on every merge (push) to main.
on:
  push:
    branches: [main]

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    # Needed to create tags and publish the release.
    permissions:
      contents: write
      id-token: write   # required for PyPI trusted publishing (OIDC)

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so git tag -l works correctly
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Compute the next version ───────────────────────────────────────────────
      # VERSION file contains MAJOR.MINOR (e.g. "0.3").
      # Patch is derived from the highest existing git tag for that MAJOR.MINOR
      # and incremented by 1.  If no tags exist yet, patch starts at 0.
      - name: Compute version
        id: ver
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          echo "Base version: $BASE"

          LATEST=$(git tag -l "v${BASE}.*" | sort -V | tail -1)
          echo "Latest matching tag: ${LATEST:-none}"

          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PATCH=$(echo "$LATEST" | sed "s/v${BASE}\.//")
            PATCH=$((PATCH + 1))
          fi

          FULL="${BASE}.${PATCH}"
          TAG="v${FULL}"
          echo "New version: $TAG"

          echo "full=${FULL}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"   >> $GITHUB_OUTPUT

      # ── Bump version in pyproject.toml (build-time only, not committed back) ──
      - name: Bump version in pyproject.toml
        run: |
          VER="${{ steps.ver.outputs.full }}"
          sed -i "s/^version = \".*\"/version = \"${VER}\"/" pyproject.toml

      # ── Build wheel + sdist ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build
        run: python -m build

      # ── Run tests ─────────────────────────────────────────────────────────────
      - name: Install package + test deps
        run: pip install ".[dev]"

      - name: Test
        run: pytest

      # ── Publish to PyPI (trusted publishing / OIDC) ───────────────────────────
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ── Tag & publish GitHub release ──────────────────────────────────────────
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:              ${{ steps.ver.outputs.tag }}
          name:                  WAF++ PASS (wafpass-core) ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
